name = "scrimble-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[vars]
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "scrimble"
database_id = "placeholder-will-be-set-on-deploy"

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "scrimble-artifacts"

[[durable_objects.bindings]]
name = "PROGRESS_HUB"
class_name = "GenerationProgressHub"

[[migrations]]
tag = "v1"
new_classes = ["GenerationProgressHub"]
